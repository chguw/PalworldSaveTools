name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., v2.0.0)"
        required: true
      release_name:
        description: "Release name"
        required: true
        default: "New Release"
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Is this a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Create source tarball
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git archive --format=tar.gz -o "PalworldSaveTools-${VERSION}-source.tar.gz" HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: PalworldSaveTools-*-source.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
      - name: Set standalone mode
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/data/configs
          Set-Content -Path src/data/configs/runtime.cfg -Value "[build]`nstandalone = true"
      - name: Build with cx_Freeze
        run: uv run python setup_freeze.py build
      - name: Create dist directory
        run: mkdir dist
      - name: Create standalone zip
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          Compress-Archive -Path PST_standalone\* -DestinationPath "dist\PalworldSaveTools-$version-windows-standalone.zip" -Force
      - name: Create portable SFX exe
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          & "C:\Program Files\7-Zip\7z.exe" a -sfx "dist\PalworldSaveTools-$version-windows-portable.exe" .\PST_standalone\* | Out-Null
      - name: Create setup installer
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" "pst.windows.iss" | Out-Null
          $setupFile = Get-ChildItem -Recurse -Filter "PalworldSaveTools-*-windows-setup.exe" | Select-Object -First 1
          if ($setupFile -and $setupFile.DirectoryName -ne (Resolve-Path "dist")) {
            Move-Item -Path $setupFile.FullName -Destination "dist\" -Force
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist\PalworldSaveTools-*-windows-standalone.zip
            dist\PalworldSaveTools-*-windows-portable.exe
            dist\PalworldSaveTools-*-windows-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
      - name: Set standalone mode
        run: |
          mkdir -p src/data/configs
          printf '[build]\nstandalone = true\n' > src/data/configs/runtime.cfg
      - name: Build with cx_Freeze
        run: uv run python setup_freeze.py build
      - name: Create dist directory
        run: mkdir -p dist
      - name: Create standalone zip
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd PST_standalone && zip -r "../dist/PalworldSaveTools-${VERSION}-linux-standalone.zip" . && cd ..
      - name: Create AppImage
        run: |
          VERSION="${{ github.event.inputs.version }}"

          mkdir -p AppDir/usr/bin
          cp -r PST_standalone/* AppDir/usr/bin/
          cp resources/PST.png AppDir/palworld-save-tools.png

          # AppStream metadata
          cat > AppDir/palworld-save-tools.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Palworld Save Tools
          Comment=All-in-one tool for fixing/transferring/editing Palworld saves
          Icon=palworld-save-tools
          Exec=PalworldSaveTools
          Categories=Utility;
          Terminal=false
          EOF

          # Fix executable name (cx_Freeze strips .exe on Linux/macOS)
          mv AppDir/usr/bin/PalworldSaveTools.exe AppDir/usr/bin/PalworldSaveTools 2>/dev/null || true
          chmod +x AppDir/usr/bin/PalworldSaveTools

          cat > AppDir/AppRun << 'RUNEOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/bin:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/PalworldSaveTools" "$@"
          RUNEOF
          chmod +x AppDir/AppRun

          # Build AppImage
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir "dist/PalworldSaveTools-${VERSION}-linux-x86_64.AppImage"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/PalworldSaveTools-*-linux-standalone.zip
            dist/PalworldSaveTools-*-linux-x86_64.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install dependencies
        run: |
          uv venv
          CXXFLAGS="-std=c++11" uv pip install -r requirements.txt
      - name: Set standalone mode
        run: |
          mkdir -p src/data/configs
          printf '[build]\nstandalone = true\n' > src/data/configs/runtime.cfg
      - name: Build with cx_Freeze
        run: uv run python setup_freeze.py build
      - name: Create dist directory
        run: mkdir -p dist
      - name: Create .app bundle and DMG
        run: |
          VERSION="${{ github.event.inputs.version }}"
          APPNAME="Palworld Save Tools"

          mkdir -p "${APPNAME}.app/Contents/MacOS" "${APPNAME}.app/Contents/Resources"
          cp -r PST_standalone/* "${APPNAME}.app/Contents/MacOS/"
          # cx_Freeze on macOS produces extensionless binary; fix if .exe exists
          if [ -f "${APPNAME}.app/Contents/MacOS/PalworldSaveTools.exe" ]; then
            mv "${APPNAME}.app/Contents/MacOS/PalworldSaveTools.exe" "${APPNAME}.app/Contents/MacOS/PalworldSaveTools"
          fi
          chmod +x "${APPNAME}.app/Contents/MacOS/PalworldSaveTools"

          cat > "${APPNAME}.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>${APPNAME}</string>
              <key>CFBundleDisplayName</key><string>${APPNAME}</string>
              <key>CFBundleIdentifier</key><string>com.palworldsavetools.app</string>
              <key>CFBundleVersion</key><string>${VERSION}</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleExecutable</key><string>PalworldSaveTools</string>
              <key>LSMinimumSystemVersion</key><string>10.15</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

          hdiutil create -volname "${APPNAME}" -srcfolder "${APPNAME}.app" -ov -format UDZO "dist/PalworldSaveTools-${VERSION}-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/PalworldSaveTools-*-macos.dmg

  create-release:
    needs: [prepare-source, build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List all artifacts
        run: find artifacts -type f -ls
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_name }}
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
