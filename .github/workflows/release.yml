name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., v2.0.0)"
        required: true
      release_name:
        description: "Release name"
        required: true
        default: "New Release"
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Is this a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  INCLUDE_MODULES: >-
    palsav,palsav.core,palsav.archive,palsav.paltypes,palsav.gvas,
    palsav.json_tools,palsav._cityhash,palsav.compressor,
    palsav.compressor.enums,palsav.compressor.oozlib,
    palsav.compressor.zlib,palsav.commands,palsav.commands.convert,
    palsav.commands.backup,palsav.commands.diag,
    palsav.commands.resave_test,palsav.commands.auto_update,
    palsav.commands.roundtrip_validation,palsav.rawdata,
    palooz,palworld_coord,palworld_toolsets,palworld_xgp_import,
    nerdfont,orjson,brotli,cbor2,zstandard,py7zr,packaging
  EXCLUDE_MODULES: >-
    tkinter,unittest,pdb,lib2to3,distutils,setuptools,pip,wheel,
    venv,ensurepip,numpy,pandas,matplotlib,scipy,IPython,
    PySide6.QtQuick,PySide6.QtQml,PySide6.QtDesigner,PySide6.QtHelp,
    PySide6.QtTest,PySide6.QtDBus,PySide6.QtPrintSupport,PySide6.QtSql,
    PySide6.QtUiTools,PySide6.QtSvgWidgets,PySide6.QtXml,
    PySide6.QtBluetooth,PySide6.QtNetwork,PySide6.QtOpenGL,
    PySide6.QtPositioning,PySide6.QtSensors,PySide6.QtSerialPort,
    PySide6.QtWebSockets,PySide6.QtMultimedia,PySide6.QtMultimediaWidgets

jobs:
  prepare-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Create source tarball
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git archive --format=tar.gz -o "PalworldSaveTools-${VERSION}-source.tar.gz" HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: PalworldSaveTools-*-source.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install --no-cache -r requirements.txt nuitka
      - name: Build with Nuitka (onefile)
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          uv run nuitka --onefile --enable-plugin=pyside6 --disable-console `
            --include-module=$env:INCLUDE_MODULES `
            --nofollow-import-to=$env:EXCLUDE_MODULES `
            --include-data-dir=resources=resources `
            --include-data-dir=src/data=src/data `
            --include-data-file=src/games.json=games.json `
            --include-data-file=README.md=README.md `
            --include-data-file=license=license `
            --windows-icon-from-ico=resources/assets/icons/app/icon.ico `
            --product-name="Palworld Save Tools" `
            --file-version=$v `
            --output-dir=dist `
            --output-filename="PalworldSaveTools-${v}-windows-x86_64.exe" `
            src/palworld_aio/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/PalworldSaveTools-*-windows-*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv
          uv pip install --no-cache -r requirements.txt nuitka
      - name: Build with Nuitka (onefile)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          uv run nuitka --onefile --enable-plugin=pyside6 \
            --include-module="$INCLUDE_MODULES" \
            --nofollow-import-to="$EXCLUDE_MODULES" \
            --include-data-dir=resources=resources \
            --include-data-dir=src/data=src/data \
            --include-data-file=src/games.json=games.json \
            --include-data-file=README.md=README.md \
            --include-data-file=license=license \
            --product-name="Palworld Save Tools" \
            --file-version="$VERSION" \
            --output-dir=dist \
            --output-filename="PalworldSaveTools-${VERSION}-linux-x86_64" \
            src/palworld_aio/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/PalworldSaveTools-*-linux-*

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install --no-cache -r requirements.txt nuitka
      - name: Build with Nuitka (app bundle)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          uv run nuitka --standalone --enable-plugin=pyside6 \
            --include-module="$INCLUDE_MODULES" \
            --nofollow-import-to="$EXCLUDE_MODULES" \
            --include-data-dir=resources=resources \
            --include-data-dir=src/data=src/data \
            --include-data-file=src/games.json=games.json \
            --include-data-file=README.md=README.md \
            --include-data-file=license=license \
            --macos-create-app-bundle \
            --macos-app-name="Palworld Save Tools" \
            --macos-app-icon=resources/assets/icons/app/icon.ico \
            --product-name="Palworld Save Tools" \
            --file-version="$VERSION" \
            --output-dir=dist \
            src/palworld_aio/main.py
      - name: Create DMG
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p dmg
          mv dist/*.app dmg/
          hdiutil create -volname "Palworld Save Tools" -srcfolder dmg -ov -format UDZO "dist/PalworldSaveTools-${VERSION}-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/PalworldSaveTools-*-macos.dmg

  create-release:
    needs: [prepare-source, build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List all artifacts
        run: find artifacts -type f -ls
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_name }}
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
