name: Test Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Target OS to build for"
        required: true
        default: linux
        type: choice
        options:
          - linux
          - macos
          - windows
      signing:
        description: "macOS code signing mode (ignored on other OSs)"
        required: false
        default: none
        type: choice
        options:
          - none
          - ad-hoc

concurrency:
  group: test-build-${{ github.event.inputs.os }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    if: ${{ github.event.inputs.os == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-test-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-linux
          if-no-files-found: error

  build-mac:
    if: ${{ github.event.inputs.os == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka imageio
      - name: Build macOS DMG
        run: |
          if [ "${{ github.event.inputs.signing }}" = "ad-hoc" ]; then
            uv run python build/macos_build.py --ad-hoc
          else
            uv run python build/macos_build.py
          fi
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-test-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error

  build-windows:
    if: ${{ github.event.inputs.os == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        shell: bash
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        shell: bash
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-test-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*.exe
          if-no-files-found: error
