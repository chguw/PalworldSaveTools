name: Build All & Test

on:
  workflow_dispatch:
    inputs:
      draft_release:
        description: "Draft a test release? (title: Testing_<version>)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-all-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_mode: --onefile
            system_deps: ""
            extra_deps: ""
            artifact_name: windows-build
            artifact_glob: "*.exe"
          - os: ubuntu-latest
            platform: linux
            build_mode: --onefile
            system_deps: "patchelf file"
            extra_deps: ""
            artifact_name: linux-build
            artifact_glob: "*-linux"
          - os: macos-latest
            platform: macos
            build_mode: --onedir
            system_deps: ""
            extra_deps: "imageio"
            artifact_name: macos-build
            artifact_glob: "*-macos.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Bootstrap environment
        id: env
        uses: ./.github/actions/setup-build-env
      - name: Install system deps
        if: ${{ matrix.system_deps != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.system_deps }}
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka ${{ matrix.extra_deps }}
      - name: Build with Nuitka
        if: ${{ matrix.platform != 'macos' }}
        run: uv run python build/nuitka/build_nuitka.py ${{ matrix.build_mode }}
      - name: Build macOS DMG
        if: ${{ matrix.platform == 'macos' }}
        run: uv run python build/macos_build.py --ad-hoc
      - name: Verify build output
        shell: bash
        run: |
          echo "=== Files in dist/ ==="
          if ! ls -la dist/; then
            echo "::error::dist/ directory not found — build produced no output"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ steps.env.outputs.app_name }}-${{ matrix.artifact_glob }}
          if-no-files-found: error

  draft-test-release:
    needs: build
    if: ${{ github.event.inputs.draft_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap environment
        id: env
        uses: ./.github/actions/setup-build-env
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: List all artifacts
        run: find artifacts -type f -ls
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: Testing_${{ steps.env.outputs.version }}
          name: Testing_${{ steps.env.outputs.version }}
          draft: true
          prerelease: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
