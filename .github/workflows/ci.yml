name: CI

on:
  push:
    branches:
      - master
      - main
      - 'dev/**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        shell: bash
        run: |
          APP_NAME=$(uv run python -c "from src.common import APP_NAME; print(APP_NAME)" 2>/dev/null || echo 'PalworldSaveTools')
          APP_VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(uv run python -c "from src.common import APP_NAME; print(APP_NAME)" 2>/dev/null || echo 'PalworldSaveTools')
          APP_VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-linux
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(uv run python -c "from src.common import APP_NAME; print(APP_NAME)" 2>/dev/null || echo 'PalworldSaveTools')
          APP_VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt nuitka imageio
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onedir
      - name: Create DMG
        run: |
          APP="${{ steps.app_info.outputs.app_name }}"
          VER="${{ steps.app_info.outputs.version }}"
          app=$(ls -d dist/*.app 2>/dev/null | head -1)
          if [ -n "$app" ]; then
            hdiutil create -volname "Palworld Save Tools" -srcfolder "$app" -ov -format UDZO "dist/${APP}-${VER}-macos.dmg"
          else
            echo "No .app bundle found in dist/"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error
