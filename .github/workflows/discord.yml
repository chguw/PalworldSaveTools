name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mock_version:
        description: "Mock version tag for testing (e.g., v0.0.0)"
        required: false
        default: "v0.0.0"

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
      - name: Build payload
        id: payload
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "release_name=${{ github.event.release.name }}" >> "$GITHUB_OUTPUT"
            echo "release_url=${REPO_URL}/releases/tag/${TAG}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.mock_version }}"
            echo "release_name=[MOCK-UP] ${{ steps.app_info.outputs.app_name }} ${TAG}" >> "$GITHUB_OUTPUT"
            echo "release_url=${REPO_URL}/releases/tag/${TAG}" >> "$GITHUB_OUTPUT"
          fi
      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          APP_NAME: ${{ steps.app_info.outputs.app_name }}
          RELEASE_NAME: ${{ steps.payload.outputs.release_name }}
          RELEASE_URL: ${{ steps.payload.outputs.release_url }}
        run: |
          payload=$(cat <<ENDJSON
          {
            "username": "${APP_NAME}",
            "avatar_url": "https://raw.githubusercontent.com/deafdudecomputers/PalworldSaveTools/main/resources/assets/icons/app/icon.png",
            "content": "${RELEASE_NAME}\n${RELEASE_URL}"
          }
          ENDJSON
          )
          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "Notification sent successfully"
