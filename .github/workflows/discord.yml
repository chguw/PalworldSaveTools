name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mock_release_name:
        description: "Mock release name (for manual testing)"
        required: false
        default: "PalworldSaveTools v2.0.0"
      mock_release_url:
        description: "Mock release URL (for manual testing)"
        required: false
        default: "https://github.com/deafdudecomputers/PalworldSaveTools/releases"

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(python3 -c "import sys; sys.path.insert(0,'src'); from common import APP_NAME; print(APP_NAME)" 2>/dev/null || echo 'PalworldSaveTools')
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
      - name: Build payload
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "release_name=${{ github.event.release.name }}" >> "$GITHUB_OUTPUT"
            echo "release_url=${{ github.event.release.html_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=${{ github.event.inputs.mock_release_name }}" >> "$GITHUB_OUTPUT"
            echo "release_url=${{ github.event.inputs.mock_release_url }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Send Discord notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          APP_NAME: ${{ steps.app_info.outputs.app_name }}
          RELEASE_NAME: ${{ steps.payload.outputs.release_name }}
          RELEASE_URL: ${{ steps.payload.outputs.release_url }}
        run: |
          payload=$(cat <<ENDJSON
          {
            "username": "${APP_NAME}",
            "avatar_url": "https://raw.githubusercontent.com/deafdudecomputers/PalworldSaveTools/main/resources/assets/icons/app/icon.png",
            "content": "${RELEASE_NAME}\n${RELEASE_URL}"
          }
          ENDJSON
          )
          curl -sf -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "Notification sent successfully"
