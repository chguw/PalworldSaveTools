name: Build All & Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create source tarball
        run: |
          APP_NAME="${{ steps.app_info.outputs.app_name }}"
          VERSION="${{ steps.app_info.outputs.version }}"
          git archive --format=tar.gz -o "${APP_NAME}-v${VERSION}-source.tar.gz" HEAD
      - name: List built files
        run: ls -la *.tar.gz || echo "source tarball not found"
      - uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: ${{ steps.app_info.outputs.app_name }}-*-source.tar.gz
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        shell: bash
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        shell: bash
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-linux
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka imageio
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onedir
      - name: Create DMG
        run: |
          APP_NAME="${{ steps.app_info.outputs.app_name }}"
          VERSION="${{ steps.app_info.outputs.version }}"
          app=$(ls -d dist/*.app 2>/dev/null | head -1)
          if [ -n "$app" ]; then
            hdiutil create -volname "Palworld Save Tools" -srcfolder "$app" -ov -format UDZO "dist/${APP_NAME}-${VERSION}-macos.dmg"
          else
            echo "No .app bundle found in dist/"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            exit 1
          fi
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error

  create-release:
    needs: [prepare-source, build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: List all artifacts
        run: find artifacts -type f -ls
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.app_info.outputs.version }}
          name: ${{ steps.app_info.outputs.app_name }} v${{ steps.app_info.outputs.version }}
          draft: true
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
