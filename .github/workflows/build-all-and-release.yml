name: Build All & Release

on:
  workflow_dispatch:
    inputs:
      append_only:
        description: "Just append files to an existing draft (leave title/notes untouched)"
        required: false
        default: false
        type: boolean
      skip_github_release:
        description: "Skip GitHub release upload (requires 'Upload to Nexus Mods' to be ON)"
        required: false
        default: false
        type: boolean
      upload_to_nexus:
        description: "Upload built files to Nexus Mods"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [ "${{ github.event.inputs.skip_github_release }}" = "true" ] && \
             [ "${{ github.event.inputs.upload_to_nexus }}" != "true" ]; then
            echo "::error::'Skip GitHub release' requires 'Upload to Nexus Mods' to be enabled — otherwise nothing gets released anywhere."
            exit 1
          fi
          echo "Inputs validated OK"

  prepare-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create source tarball
        run: |
          APP_NAME="${{ steps.app_info.outputs.app_name }}"
          VERSION="${{ steps.app_info.outputs.version }}"
          git archive --format=tar.gz -o "${APP_NAME}-v${VERSION}-source.tar.gz" HEAD
      - name: List built files
        run: ls -la *.tar.gz || echo "source tarball not found"
      - uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: ${{ steps.app_info.outputs.app_name }}-*-source.tar.gz
          if-no-files-found: error

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        shell: bash
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        shell: bash
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*.exe
          if-no-files-found: error

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-linux
          if-no-files-found: error

  build-mac:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka imageio
      - name: Build macOS DMG
        run: uv run python build/macos_build.py --ad-hoc
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error

  create-release:
    needs: [prepare-source, build-windows, build-linux, build-mac]
    if: ${{ github.event.inputs.skip_github_release != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: List all artifacts
        run: find artifacts -type f -ls
      - name: Verify existing release by tag
        if: ${{ github.event.inputs.append_only == 'true' }}
        id: find_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.app_info.outputs.version }}
        run: |
          # Confirm a release with this tag already exists (draft or published)
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "ERROR: No release found with tag '$TAG'. Untick 'append_only' or create the release first."
            gh release list --repo "${{ github.repository }}" --limit 10
            exit 1
          fi
          echo "Found existing release: $TAG"
      - name: Append files to existing release (no edits)
        if: ${{ github.event.inputs.append_only == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.app_info.outputs.version }}" \
            --repo "${{ github.repository }}" \
            artifacts/**/* \
            --clobber
      - name: Generate release notes
        if: ${{ github.event.inputs.append_only != 'true' }}
        id: notes
        env:
          APP_NAME: ${{ steps.app_info.outputs.app_name }}
          VERSION: ${{ steps.app_info.outputs.version }}
          GAME_VERSION: ${{ steps.app_info.outputs.game_version }}
        run: |
          cat > release_notes.md <<EOF
          # 🚀 Release v${VERSION}

          ### 🛠️ Compatibility & Versions

          * **App Version:** \`${VERSION}\`
          * **Game Version:** \`${GAME_VERSION}\`

          ---

          <details>
          <summary>🛠️ All-in-One Tools Update</summary>

          ### 🚀 Updated:

          ### 🔧 Fixed:

          </details>

          ---

          ### 🤝 Support

          If you encounter any bugs or have feedback, please:

          * Open a GitHub issue:
            https://github.com/deafdudecomputers/PalworldSaveTools/issues
          * Join our Discord:
            https://discord.gg/sYcZwcT4cT
          * DM **Pylar1991** on Discord

          *Thank you for using the tool!* 🙏
          EOF
      - name: Create draft release (with notes)
        if: ${{ github.event.inputs.append_only != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.app_info.outputs.version }}
          name: v${{ steps.app_info.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-nexus:
    needs: [validate, build-windows, build-linux, build-mac]
    if: ${{ github.event.inputs.upload_to_nexus == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: windows
            artifact_name: windows-build
            asset_glob: "PalworldSaveTools-V*-nk-win.exe"
            file_id: "7648655"
          - variant: linux
            artifact_name: linux-build
            asset_glob: "PalworldSaveTools-V*-nk-linux"
            file_id: "7648652"
          - variant: macos
            artifact_name: macos-build
            asset_glob: "PalworldSaveTools-V*-nk-macos.dmg"
            file_id: "7648646"
    steps:
      - uses: actions/checkout@v7
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: dist
      - name: Ensure upload is a zip
        id: package
        run: |
          asset=$(ls dist/${{ matrix.asset_glob }} 2>/dev/null | head -1)
          if [ -z "$asset" ]; then
            echo "No asset matching ${{ matrix.asset_glob }} in ${{ matrix.artifact_name }}" >&2
            exit 1
          fi
          case "$asset" in
            *.zip)
              echo "upload_file=$asset" >> "$GITHUB_OUTPUT"
              ;;
            *)
              zip_name="${asset%.*}.zip"
              zip -j "$zip_name" "$asset"
              echo "upload_file=$zip_name" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ matrix.file_id }}
          filename: ${{ steps.package.outputs.upload_file }}
          version: ${{ steps.app_info.outputs.version }}
          display_name: v${{ steps.app_info.outputs.version }}_${{ matrix.variant }}
          archive_existing_version: true
