name: Release Build

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Target OS to build and release"
        required: true
        default: linux
        type: choice
        options:
          - linux
          - macos
          - windows

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event.inputs.os }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    if: ${{ github.event.inputs.os == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-release-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-linux
          if-no-files-found: error
      - name: Generate release notes
        env:
          VERSION: ${{ steps.app_info.outputs.version }}
          GAME_VERSION: ${{ steps.app_info.outputs.game_version }}
        run: |
          cat > release_notes.md <<EOF
          # 🚀 Release v${VERSION}

          ### 🛠️ Compatibility & Versions

          * **App Version:** \`${VERSION}\`
          * **Game Version:** \`${GAME_VERSION}\`

          ---

          <details>
          <summary>🛠️ All-in-One Tools Update</summary>

          ### 🚀 Updated:

          ### 🔧 Fixed:

          </details>

          ---

          ### 🤝 Support

          If you encounter any bugs or have feedback regarding the new **Beta features**, please:

          * Open a GitHub issue:
            https://github.com/deafdudecomputers/PalworldSaveTools/issues
          * Join our Discord:
            https://discord.gg/sYcZwcT4cT
          * DM **Pylar1991** on Discord

          *Thank you for using the tool!* 🙏
          EOF
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          tag_name: v${{ steps.app_info.outputs.version }}
          name: v${{ steps.app_info.outputs.version }}
          draft: true
          prerelease: true
          files: dist/${{ steps.app_info.outputs.app_name }}-*-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    if: ${{ github.event.inputs.os == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka imageio
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onedir
      - name: Create DMG
        run: |
          APP_NAME="${{ steps.app_info.outputs.app_name }}"
          VERSION="${{ steps.app_info.outputs.version }}"
          app=$(ls -d dist/*.app 2>/dev/null | head -1)
          if [ -n "$app" ]; then
            hdiutil create -volname "Palworld Save Tools" -srcfolder "$app" -ov -format UDZO "dist/${APP_NAME}-${VERSION}-macos.dmg"
          else
            echo "No .app bundle found in dist/"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            exit 1
          fi
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-release-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error
      - name: Generate release notes
        env:
          VERSION: ${{ steps.app_info.outputs.version }}
          GAME_VERSION: ${{ steps.app_info.outputs.game_version }}
        run: |
          cat > release_notes.md <<EOF
          # 🚀 Release v${VERSION}

          ### 🛠️ Compatibility & Versions

          * **App Version:** \`${VERSION}\`
          * **Game Version:** \`${GAME_VERSION}\`

          ---

          <details>
          <summary>🛠️ All-in-One Tools Update</summary>

          ### 🚀 Updated:

          ### 🔧 Fixed:

          </details>

          ---

          ### 🤝 Support

          If you encounter any bugs or have feedback regarding the new **Beta features**, please:

          * Open a GitHub issue:
            https://github.com/deafdudecomputers/PalworldSaveTools/issues
          * Join our Discord:
            https://discord.gg/sYcZwcT4cT
          * DM **Pylar1991** on Discord

          *Thank you for using the tool!* 🙏
          EOF
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          tag_name: v${{ steps.app_info.outputs.version }}
          name: v${{ steps.app_info.outputs.version }}
          draft: true
          prerelease: true
          files: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    if: ${{ github.event.inputs.os == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        shell: bash
        run: |
          APP_NAME=$(grep -m1 '^APP_NAME' src/common.py | cut -d"'" -f2)
          APP_VERSION=$(grep -m1 '^APP_VERSION' src/common.py | cut -d"'" -f2)
          GAME_VERSION=$(grep -m1 '^GAME_VERSION' src/common.py | cut -d"'" -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        shell: bash
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-release-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*.exe
          if-no-files-found: error
      - name: Generate release notes
        env:
          VERSION: ${{ steps.app_info.outputs.version }}
          GAME_VERSION: ${{ steps.app_info.outputs.game_version }}
        run: |
          cat > release_notes.md <<EOF
          # 🚀 Release v${VERSION}

          ### 🛠️ Compatibility & Versions

          * **App Version:** \`${VERSION}\`
          * **Game Version:** \`${GAME_VERSION}\`

          ---

          <details>
          <summary>🛠️ All-in-One Tools Update</summary>

          ### 🚀 Updated:

          ### 🔧 Fixed:

          </details>

          ---

          ### 🤝 Support

          If you encounter any bugs or have feedback regarding the new **Beta features**, please:

          * Open a GitHub issue:
            https://github.com/deafdudecomputers/PalworldSaveTools/issues
          * Join our Discord:
            https://discord.gg/sYcZwcT4cT
          * DM **Pylar1991** on Discord

          *Thank you for using the tool!* 🙏
          EOF
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          tag_name: v${{ steps.app_info.outputs.version }}
          name: v${{ steps.app_info.outputs.version }}
          draft: true
          prerelease: true
          files: dist/${{ steps.app_info.outputs.app_name }}-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
