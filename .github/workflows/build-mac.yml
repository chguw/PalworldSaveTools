name: Build Mac

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-mac-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install --no-cache -r requirements.txt nuitka imageio
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onedir
      - name: Create DMG
        run: |
          VERSION="$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo 'dev')"
          app=$(ls -d dist/*.app 2>/dev/null | head -1)
          if [ -n "$app" ]; then
            hdiutil create -volname "Palworld Save Tools" -srcfolder "$app" -ov -format UDZO "dist/PalworldSaveTools-${VERSION}-macos.dmg"
          else
            echo "No .app bundle found in dist/"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            exit 1
          fi
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v6
        with:
          name: macos-build
          path: dist/PalworldSaveTools-*-macos.dmg
          if-no-files-found: error
      - name: Get version
        id: version
        run: |
          VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=build-macos-v${VERSION}-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MacOS Build ${{ steps.version.outputs.version }}"
          draft: true
          prerelease: true
          files: dist/PalworldSaveTools-*-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
