name: Test Build macOS

on:
  workflow_dispatch:
    inputs:
      signing:
        description: "Code signing mode"
        required: true
        default: none
        type: choice
        options:
          - none
          - ad-hoc

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(uv run python -c "from src.common import APP_NAME; print(APP_NAME)" 2>/dev/null || echo 'PalworldSaveTools')
          APP_VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt nuitka imageio
      - name: Build macOS DMG
        id: build
        run: |
          if [ "${{ github.event.inputs.signing }}" = "ad-hoc" ]; then
            uv run python build/macos_build.py --ad-hoc
          else
            uv run python build/macos_build.py
          fi
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-test-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-macos.dmg
          if-no-files-found: error
