name: Build Linux

on:
  workflow_dispatch:

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv
          uv pip install --no-cache -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/PalworldSaveTools-*-linux-*
