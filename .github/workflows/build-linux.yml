name: Build Linux

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
        continue-on-error: true
      - name: Extract app info
        id: app_info
        run: |
          APP_NAME=$(uv run python -c "from src.common import APP_NAME; print(APP_NAME)" 2>/dev/null || echo 'PalworldSaveTools')
          APP_VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: dist/${{ steps.app_info.outputs.app_name }}-*-linux
          if-no-files-found: error
      - name: Generate release tag
        id: tag
        run: |
          echo "tag=${{ steps.app_info.outputs.app_name }}-v${{ steps.app_info.outputs.version }}-linux-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Linux Build ${{ steps.app_info.outputs.app_name }} v${{ steps.app_info.outputs.version }}"
          draft: true
          prerelease: true
          files: dist/${{ steps.app_info.outputs.app_name }}-*-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
