name: Build Linux

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf file
      - name: Install dependencies
        run: |
          uv venv
          uv pip install --no-cache -r requirements.txt nuitka
      - name: Build with Nuitka
        run: uv run python build/nuitka/build_nuitka.py --onefile
      - name: List built files
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/ || echo "dist/ directory not found"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/PalworldSaveTools-*-linux
          if-no-files-found: error
      - name: Get version
        id: version
        run: |
          VERSION=$(uv run python -c "from src.common import APP_VERSION; print(APP_VERSION)" 2>/dev/null || echo '0.0.0')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=build-linux-v${VERSION}-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Linux Build ${{ steps.version.outputs.version }}"
          draft: true
          prerelease: true
          files: dist/PalworldSaveTools-*-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
